# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
- main

schedules:
- cron: "01 12 * * 1-5"
  displayName: Development Environment Rebuilds
  branches:
    include:
    - main
  always: true

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  tagDate: $[ format('{0:yyyy}.{0:MM}.{0:dd}.{0:HH}.{0:mm}{0:ss}', pipeline.startTime) ]
  isMain: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  
stages:
- stage: Build
  condition: and(succeeded(), eq(variables.isMain, 'true'))
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: ubuntu-latest
    steps:            
    - task: Docker@2
      displayName: Build Postgres Image for Postgres 17
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/postgres17ubuntu/Dockerfile'
        tags: | 
              postgres17ubuntu_latest
              postgres17ubuntu_$(tagDate)              
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev 
    - script: |
        docker system prune -af
      displayName: 'Cleanup Docker space'     
    - task: Docker@2
      displayName: Build Postgres Image for Postgres 17
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/postgres17/Dockerfile'
        tags: | 
              postgres17_latest
              postgres17_$(tagDate)              
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev 
    - script: |
        docker system prune -af
      displayName: 'Cleanup Docker space'       
    - task: Docker@2
      displayName: Build Postgres Image for Postgres 16
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/postgres16/Dockerfile'
        tags: | 
              postgres16_latest
              postgres16_$(tagDate)              
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev 
    - script: |
        docker system prune -af
      displayName: 'Cleanup Docker space'    
    - task: Docker@2
      displayName: Build Postgres Image for Ubuntu 24.04 Postgres 17
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/postgresubuntu2404/Dockerfile'
        tags: | 
              postgresubuntu2404_latest
              postgresubuntu2404_$(tagDate)              
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev 
    - script: |
        docker system prune -af
      displayName: 'Cleanup Docker space'        
    - task: Docker@2
      displayName: Build Postgres Image for Ubuntu 24.04 Postgres 16
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/postgres16ubuntu2404/Dockerfile'
        tags: |
              postgresubuntu2404_16_latest
              postgresubuntu2404_16_$(tagDate)
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev
    - script: |
        docker system prune -af
      displayName: 'Cleanup Docker space'        
    - task: Docker@2
      displayName: Build Ubuntu 24.04 Development Environment
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/ubuntu2404_dev/Dockerfile'
        tags: | 
              ubuntu2404_dev_latest
              ubuntu2404_dev_$(tagDate)              
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev 
    - script: |
        docker system prune -af
      displayName: 'Cleanup Docker space'        
    - task: Docker@2
      displayName: Build Postgres Image for Ubuntu 20.04
      inputs:
        command: buildAndPush
        dockerfile: '$(Build.SourcesDirectory)/postgres/postgresubuntu2004/Dockerfile'
        tags: | 
              postgresubuntu2004_latest
              postgresubuntu2004_$(tagDate)              
        containerRegistry: DockerGitHub
        repository: ghcr.io/dbca-wa/docker-apps-dev 
